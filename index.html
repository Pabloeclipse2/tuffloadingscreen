<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Z-CITY ROLEPLAY | Loading</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background: #000; 
        font-family: 'Roboto Condensed', Arial, sans-serif; 
    }

    /* ── Slideshow ────────────────── */
    #slideshow { 
        position: absolute; 
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 1; 
    }
    .slide {
      position: absolute; 
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover; 
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0; 
      transition: opacity 1.5s ease-in-out;
    }
    .slide.active { opacity: 1; }
    
    /* 
      BILDER: Lege deine Bilder in denselben Ordner wie diese index.html
      Beispiel: loading/index.html + loading/bg1.jpg usw.
    */
    #slide1 { background-image: url('bg1.jpg'); }
    #slide2 { background-image: url('bg2.jpg'); }
    #slide3 { background-image: url('bg3.jpg'); }

    /* Dunkles Overlay */
    #overlay { 
        position: absolute; 
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.6) 100%);
        z-index: 2;
    }

    /* ── Info Panel ────────────────── */
    #info-panel {
      position: absolute;
      top: 10%;
      left: 5%;
      z-index: 10;
      color: #fff;
      text-transform: uppercase;
      opacity: 0;
      transform: translateX(-30px);
      transition: all 1.2s ease-out;
      width: 90%; 
      max-width: 600px; 
    }
    #info-panel.visible { opacity: 1; transform: translateX(0); }

    #info-panel h1 { 
        font-size: clamp(40px, 6vw, 72px);
        font-weight: 700; 
        line-height: 0.9; 
        letter-spacing: -2px; 
        text-shadow: 2px 2px 15px rgba(0,0,0,0.7);
        margin-bottom: 20px;
        word-wrap: break-word;
    }
    #info-panel h1 span { color: #ff0000; } 
    
    #info-panel p { 
        font-size: clamp(14px, 2vw, 18px);
        font-weight: 300; 
        color: #ddd; 
        letter-spacing: 1px;
        text-shadow: 1px 1px 8px rgba(0,0,0,0.8);
        text-transform: none;
        line-height: 1.6;
        background: rgba(0, 0, 0, 0.4);
        padding: 15px;
        border-left: 4px solid #ff0000;
        word-wrap: break-word;
    }

    /* ── Ladebalken ────────────────── */
    #progress-bar-wrapper {
      position: absolute;
      bottom: 40px;
      left: 5%;
      width: 90%;
      z-index: 10;
      opacity: 0;
      transition: opacity 1s ease-out 0.5s;
    }
    #progress-bar-wrapper.visible { opacity: 1; }

    #progress-label {
      color: #aaa;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    #progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.15);
    }
    #progress-fill {
      height: 3px;
      width: 0%;
      background: #ff0000;
      transition: width 0.3s ease-out;
    }
  </style>
</head>
<body>

  <!-- 
    AUDIO: Lege deine .ogg oder .mp3 Dateien in denselben Ordner.
    Beispiel: theme.ogg, theme1.ogg
  -->
  <audio id="bg-music" loop></audio>

  <div id="slideshow">
    <div id="slide1" class="slide active"></div>
    <div id="slide2" class="slide"></div>
    <div id="slide3" class="slide"></div>
  </div>

  <div id="overlay"></div>

  <div id="info-panel">
    <h1>Z-CITY<br><span>ROLEPLAY</span></h1>
    <p>
      Willkommen auf Z-City Roleplay. Server lädt – bitte warten.
    </p>
  </div>

  <div id="progress-bar-wrapper">
    <div id="progress-label">Verbinde mit Server...</div>
    <div id="progress-track">
      <div id="progress-fill"></div>
    </div>
  </div>

  <script>
    // ── Audio ──────────────────────────────────────────────
    // Dateien im selben Ordner wie index.html ablegen
    var audioFiles = ['theme.ogg', 'theme1.ogg'];
    var audio = document.getElementById('bg-music');
    audio.src = audioFiles[Math.floor(Math.random() * audioFiles.length)];
    audio.volume = 0.3;

    function tryPlayMusic() {
      var p = audio.play();
      if (p !== undefined) {
        p.catch(function() { /* Browser blockiert Autoplay – wartet auf Interaktion */ });
      }
    }

    // ── Panel & Ladebalken einblenden ──────────────────────
    window.onload = function() {
      setTimeout(function() {
        document.getElementById('info-panel').classList.add('visible');
        document.getElementById('progress-bar-wrapper').classList.add('visible');
        tryPlayMusic();
      }, 500);
    };

    // ── Slideshow ──────────────────────────────────────────
    var slides = document.querySelectorAll('.slide');
    var cur = 0;
    setInterval(function() {
      slides[cur].classList.remove('active');
      cur = (cur + 1) % slides.length;
      slides[cur].classList.add('active');
    }, 6000);

    // ── GMod Ladefortschritt ───────────────────────────────
    var fill  = document.getElementById('progress-fill');
    var label = document.getElementById('progress-label');

    // GMod ruft diese Funktion mit einem Statustext auf
    function SetStatusChanged(status) {
      tryPlayMusic();

      // Status-Text anzeigen
      label.textContent = status;

      // Fortschritt anhand bekannter GMod-Phasen schätzen
      if (status.indexOf('Connecting') !== -1)           fill.style.width = '10%';
      else if (status.indexOf('Getting host info') !== -1) fill.style.width = '25%';
      else if (status.indexOf('Sending client info') !== -1) fill.style.width = '45%';
      else if (status.indexOf('Downloading') !== -1)     fill.style.width = '65%';
      else if (status.indexOf('Sending') !== -1)         fill.style.width = '80%';
      else if (status.indexOf('Done') !== -1) {
        fill.style.width = '100%';
        label.textContent = 'Bereit!';
      }
    }

    // Fallback: Interaktionen nutzen um Audio zu starten
    window.addEventListener('message', tryPlayMusic);
    document.addEventListener('click',  tryPlayMusic);
  </script>
</body>
</html>
